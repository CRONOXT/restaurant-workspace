<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-placeholder">R</div>
      <h2>Bienvenido de nuevo</h2>
      <p>Inicia sesión en el panel de administración</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="admin@restaurante.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="••••••••"
          autocomplete="current-password"
        >
      </div>

      <!-- Toast flotante en lugar de mensaje inline -->
      <div *ngIf="error" class="toast-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ error }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.form.valid || loading">
        <span *ngIf="!loading">Ingresar al Backoffice</span>
        <span *ngIf="loading" class="spinner-small"></span>
      </button>
    </form>
  </div>
</div>
