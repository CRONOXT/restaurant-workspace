<div class="login-page">
  <div class="login-overlay"></div>
  
  <!-- Decorative Background Elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">S</div>
        <h1 class="brand-name">Savor</h1>
        <p class="brand-tagline">Experience Management Redefined</p>
      </div>

      <div class="login-body">
        <h2 class="welcome-text">¡Qué bueno verte!</h2>
        <p class="login-subtitle">Introduce tus credenciales para acceder al panel</p>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
          <div class="form-group">
            <label for="email">
              <i class="bi bi-envelope"></i>
              Email
            </label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              [(ngModel)]="email" 
              required 
              placeholder="tu@email.com"
              autocomplete="email"
              class="styled-input"
            >
          </div>

          <div class="form-group">
            <label for="password">
              <i class="bi bi-lock"></i>
              Contraseña
            </label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              [(ngModel)]="password" 
              required 
              placeholder="••••••••"
              autocomplete="current-password"
              class="styled-input"
            >
          </div>

          <div *ngIf="error" class="error-msg animate-shake">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ error }}
          </div>

          <button type="submit" class="btn-login" [disabled]="!loginForm.form.valid || loading">
            <span *ngIf="!loading">Entrar al Sistema <i class="bi bi-arrow-right"></i></span>
            <span *ngIf="loading" class="loader"></span>
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p>© 2026 Savor Platform. Todos los derechos reservados.</p>
      </div>
    </div>
  </div>
</div>
